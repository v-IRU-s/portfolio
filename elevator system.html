<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Elevator System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #191919;
        }

        a:hover {
            color: #007bff;
            text-decoration: underline;
        }

        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        .content {
            color: #007bff;
            font-weight: bold;
            padding: 60px;
            text-align: center;
        }

        .live-link {
            display: inline-block;
            margin-top: 20px;
            color: #00aaff;
            background-color: #222;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .live-link:hover {
            background-color: #007bff;
            color: #fff;
        }

        video {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Elevator System</h1>
</header>

<div class="content">
    <video controls>
        <source src="ELevator%20System.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Add your live hosted link here -->
    <a class="live-link" href="https://elevator-system-frontend.vercel.app/" target="_blank">
        🚀 View Live Demo
    </a>
</div>

<footer>
    <p>&copy; 2024 Elevator System. All rights reserved.</p>
</footer>

</body>
</html>
